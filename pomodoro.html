<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans SC', sans-serif;
    background: #3e2f24;
    background-image:
      radial-gradient(ellipse at 50% 30%, #5a4334 0%, #2e1f14 100%);
    user-select: none;
  }

  /* ====== 桌面木纹纹理 ====== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  .app {
    text-align: center;
    position: relative;
  }

  /* ====== 标题 ====== */
  .title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #c9b896;
    letter-spacing: 0.3em;
    margin-bottom: 40px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  /* ====== 番茄主体容器 ====== */
  .tomato-wrapper {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 50px;
  }

  /* ====== 阴影底座 ====== */
  .tomato-shadow {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* ====== 番茄圆形主体 ====== */
  .tomato {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 0 auto;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #ff6b5e 0%, #e8453a 30%, #c0392b 60%, #8b1a1a 100%);
    box-shadow:
      /* 顶部高光 */
      inset 0 -20px 60px rgba(0,0,0,0.35),
      inset 0 10px 30px rgba(255,255,255,0.15),
      /* 外部立体阴影 */
      0 12px 40px rgba(0,0,0,0.5),
      0 4px 8px rgba(0,0,0,0.4),
      0 0 0 2px rgba(0,0,0,0.08),
      /* 底部反光 */
      0 -2px 8px rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease;
  }

  .tomato.ringing {
    animation: shake 0.5s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px) rotate(-3deg); }
    40% { transform: translateX(6px) rotate(3deg); }
    60% { transform: translateX(-4px) rotate(-2deg); }
    80% { transform: translateX(4px) rotate(2deg); }
  }

  /* ====== 番茄蒂 ====== */
  .stem {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  .stem-base {
    width: 28px;
    height: 32px;
    margin: 0 auto;
    background: linear-gradient(180deg, #5d8a3c 0%, #3d6b20 50%, #2d5010 100%);
    border-radius: 6px 6px 2px 2px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.2),
      0 2px 4px rgba(0,0,0,0.4);
    position: relative;
    z-index: 1;
  }

  .leaf {
    position: absolute;
    width: 50px;
    height: 26px;
    background: linear-gradient(135deg, #6db33f 0%, #4a8c2a 100%);
    border-radius: 0 80% 10% 80%;
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.25),
      0 2px 4px rgba(0,0,0,0.35);
    top: 4px;
  }

  .leaf.left {
    right: 18px;
    transform: rotate(-30deg);
    border-radius: 80% 0 80% 10%;
  }

  .leaf.right {
    left: 18px;
    transform: rotate(30deg);
    border-radius: 0 80% 10% 80%;
  }

  /* ====== 番茄高光点 ====== */
  .tomato::before {
    content: '';
    position: absolute;
    width: 60px;
    height: 40px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
    border-radius: 50%;
    top: 55px;
    left: 65px;
    transform: rotate(-15deg);
    pointer-events: none;
  }

  /* ====== 时间显示区域 ====== */
  .timer-face {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .mode-label {
    font-size: 1rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  .time-display {
    font-size: 5rem;
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 2px 4px rgba(0,0,0,0.5),
      0 0 40px rgba(255,255,255,0.1);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .cycle-count {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    margin-top: 6px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  /* ====== 按钮区域 ====== */
  .controls {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 16px 36px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s ease;
    position: relative;
    outline: none;
  }

  /* 开始按钮 - 绿色拟物 */
  .btn-start {
    background: linear-gradient(180deg, #6db33f 0%, #4a8c2a 50%, #356b16 100%);
    color: #fff;
    box-shadow:
      0 6px 0 #2d5010,
      0 8px 16px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.2);
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  .btn-start:hover {
    background: linear-gradient(180deg, #7dc44f 0%, #5a9c3a 50%, #4a8c2a 100%);
    transform: translateY(-2px);
    box-shadow:
      0 8px 0 #2d5010,
      0 10px 20px rgba(0,0,0,0.45),
      inset 0 2px 4px rgba(255,255,255,0.25);
  }

  .btn-start:active {
    transform: translateY(3px);
    box-shadow:
      0 3px 0 #2d5010,
      0 4px 8px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.2);
  }

  /* 暂停按钮 - 橙色拟物 */
  .btn-pause {
    background: linear-gradient(180deg, #f0a040 0%, #d4882a 50%, #b8701a 100%);
    color: #fff;
    box-shadow:
      0 6px 0 #8b5510,
      0 8px 16px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.2);
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  .btn-pause:hover {
    background: linear-gradient(180deg, #f5b050 0%, #e4983a 50%, #d4882a 100%);
    transform: translateY(-2px);
    box-shadow:
      0 8px 0 #8b5510,
      0 10px 20px rgba(0,0,0,0.45),
      inset 0 2px 4px rgba(255,255,255,0.25);
  }

  .btn-pause:active {
    transform: translateY(3px);
    box-shadow:
      0 3px 0 #8b5510,
      0 4px 8px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.2);
  }

  /* 重置按钮 - 灰色拟物 */
  .btn-reset {
    background: linear-gradient(180deg, #8a8a8a 0%, #666 50%, #4a4a4a 100%);
    color: #ddd;
    box-shadow:
      0 6px 0 #333,
      0 8px 16px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.15);
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  .btn-reset:hover {
    background: linear-gradient(180deg, #9a9a9a 0%, #767676 50%, #5a5a5a 100%);
    transform: translateY(-2px);
    box-shadow:
      0 8px 0 #333,
      0 10px 20px rgba(0,0,0,0.45),
      inset 0 2px 4px rgba(255,255,255,0.2);
  }

  .btn-reset:active {
    transform: translateY(3px);
    box-shadow:
      0 3px 0 #333,
      0 4px 8px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.15);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn:disabled:hover {
    transform: none;
  }

  .btn:disabled:active {
    transform: none;
  }

  /* ====== 响应式 ====== */
  @media (max-width: 420px) {
    .tomato-wrapper {
      width: 260px;
      height: 260px;
    }
    .tomato {
      width: 240px;
      height: 240px;
    }
    .time-display {
      font-size: 3.8rem;
    }
    .tomato::before {
      width: 45px;
      height: 30px;
      top: 44px;
      left: 52px;
    }
    .controls {
      gap: 12px;
    }
    .btn {
      padding: 14px 28px;
      font-size: 0.95rem;
    }
  }
</style>
</head>
<body>

<div class="app">
  <div class="title">番 茄 钟</div>

  <div class="tomato-wrapper">
    <div class="tomato-shadow"></div>

    <!-- 番茄蒂和叶子 -->
    <div class="stem">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
      <div class="stem-base"></div>
    </div>

    <!-- 番茄主体 -->
    <div class="tomato" id="tomato">
      <div class="timer-face">
        <div class="mode-label" id="modeLabel">🍅 专 注</div>
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="cycle-count" id="cycleCount">第 1 轮</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btnStart" title="开始">开 始</button>
    <button class="btn btn-reset" id="btnReset" title="重置">重 置</button>
  </div>
</div>

<script>
  const FOCUS_MINUTES = 25;
  const BREAK_MINUTES = 5;

  const tomato = document.getElementById('tomato');
  const modeLabel = document.getElementById('modeLabel');
  const timeDisplay = document.getElementById('timeDisplay');
  const cycleCount = document.getElementById('cycleCount');
  const btnStart = document.getElementById('btnStart');
  const btnReset = document.getElementById('btnReset');

  let totalSeconds = FOCUS_MINUTES * 60;
  let remainingSeconds = totalSeconds;
  let isFocusMode = true;
  let isRunning = false;
  let cycles = 1;
  let timerId = null;

  // ====== 音频 ======
  function playAlarm() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const notes = [800, 1000, 1200];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.2 + 0.3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + i * 0.2 + 0.3);
    });

    // 第二组和弦
    setTimeout(() => {
      const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
      [1000, 1200, 1400].forEach((freq, i) => {
        const osc = ctx2.createOscillator();
        const gain = ctx2.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, ctx2.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx2.currentTime + i * 0.15 + 0.25);
        osc.connect(gain);
        gain.connect(ctx2.destination);
        osc.start(ctx2.currentTime + i * 0.15);
        osc.stop(ctx2.currentTime + i * 0.15 + 0.25);
      });
    }, 800);
  }

  // ====== 格式化时间 ======
  function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // ====== 更新显示 ======
  function updateDisplay() {
    timeDisplay.textContent = formatTime(remainingSeconds);
    document.title = (isFocusMode ? '🍅' : '☕') + ' ' + formatTime(remainingSeconds) + ' - 番茄钟';
  }

  // ====== 更新模式文本 ======
  function updateModeUI() {
    if (isFocusMode) {
      modeLabel.textContent = '🍅 专 注';
    } else {
      modeLabel.textContent = '☕ 休 息';
    }
    cycleCount.textContent = '第 ' + cycles + ' 轮';
    updateDisplay();
  }

  // ====== 切换模式 ======
  function switchMode() {
    isFocusMode = !isFocusMode;
    if (isFocusMode) {
      cycles++;
      remainingSeconds = FOCUS_MINUTES * 60;
    } else {
      remainingSeconds = BREAK_MINUTES * 60;
    }
    totalSeconds = remainingSeconds;
    updateModeUI();
    playAlarm();
    tomato.classList.add('ringing');
    setTimeout(() => tomato.classList.remove('ringing'), 500);
  }

  // ====== 计时滴答 ======
  function tick() {
    remainingSeconds--;
    updateDisplay();

    if (remainingSeconds <= 0) {
      stopTimer();
      switchMode();
      startTimer();
    }
  }

  // ====== 开始计时 ======
  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    btnStart.textContent = '暂 停';
    btnStart.className = 'btn btn-pause';
    timerId = setInterval(tick, 1000);
  }

  // ====== 暂停计时 ======
  function pauseTimer() {
    if (!isRunning) return;
    isRunning = false;
    btnStart.textContent = '开 始';
    btnStart.className = 'btn btn-start';
    clearInterval(timerId);
    timerId = null;
  }

  // ====== 停止计时 (内部，不更新按钮) ======
  function stopTimer() {
    isRunning = false;
    clearInterval(timerId);
    timerId = null;
  }

  // ====== 重置 ======
  function resetTimer() {
    stopTimer();
    isFocusMode = true;
    isRunning = false;
    cycles = 1;
    remainingSeconds = FOCUS_MINUTES * 60;
    totalSeconds = remainingSeconds;
    btnStart.textContent = '开 始';
    btnStart.className = 'btn btn-start';
    updateModeUI();
  }

  // ====== 事件绑定 ======
  btnStart.addEventListener('click', () => {
    if (isRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  });

  btnReset.addEventListener('click', resetTimer);

  // ====== 键盘快捷键 ======
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    } else if (e.code === 'KeyR') {
      resetTimer();
    }
  });

  // ====== 初始状态 ======
  updateModeUI();
</script>

</body>
</html>
